<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #17212b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }

        .logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .logo-circle {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2b5278, #4fa3e3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 8px 32px rgba(79,163,227,0.35);
        }

        .logo h1 {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.3px;
        }

        .logo p {
            font-size: 15px;
            color: #708599;
            text-align: center;
        }

        .card {
            background: #1e2c3a;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }

        .error {
            background: rgba(229,57,53,0.15);
            border: 1px solid rgba(229,57,53,0.4);
            color: #ef9a9a;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 13px;
            color: #708599;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: #17212b;
            border: 2px solid #2b3d50;
            border-radius: 10px;
            font-size: 16px;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        input::placeholder { color: #4a5568; }
        input:focus { border-color: #4fa3e3; }

        .btn {
            width: 100%;
            padding: 15px;
            background: #4fa3e3;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        .btn:hover { background: #3d8ecf; }
        .btn:active { transform: scale(0.98); }

        .switch {
            text-align: center;
            font-size: 15px;
            color: #708599;
        }

        .switch a {
            color: #4fa3e3;
            text-decoration: none;
            font-weight: 600;
        }

        .switch a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="logo">
            <div class="logo-circle">💬</div>
            <h1>Мессенджер</h1>
            <p>{% if mode == 'register' %}Создайте аккаунт чтобы начать общение{% else %}Войдите чтобы продолжить{% endif %}</p>
        </div>

        <div class="card">
            {% if error %}
            <div class="error">⚠️ {{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" name="username" placeholder="Введите имя" required autofocus>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" name="password" placeholder="Введите пароль" required>
                </div>
                <button type="submit" class="btn">
                    {% if mode == 'register' %}Создать аккаунт{% else %}Войти{% endif %}
                </button>
            </form>
        </div>

        <div class="switch">
            {% if mode == 'register' %}
                Уже есть аккаунт? <a href="/login">Войти</a>
            {% else %}
                Нет аккаунта? <a href="/register">Зарегистрироваться</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
